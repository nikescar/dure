name: Release to Snapstore

on:
  workflow_run:
    workflows: ["Build and Release"]
    types:
      - completed
  workflow_dispatch:

jobs:
  download-and-deploy:
    runs-on: ubuntu-latest
    # Only run if the upstream workflow succeeded, or if manually triggered
    if: ${{ (github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch') && github.event.workflow_run.head_branch != 'test' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # - name: MS - Configure Store Credentials
      #   uses: microsoft/store-submission@v1
      #   with:
      #     command: configure
      #     type: win32
      #     seller-id: ${{ secrets.SELLER_ID }}
      #     product-id: ${{ secrets.PRODUCT_ID }}
      #     tenant-id: ${{ secrets.TENANT_ID }}
      #     client-id: ${{ secrets.CLIENT_ID }}
      #     client-secret: ${{ secrets.CLIENT_SECRET }}

      # - name: MS - Update Draft Submission
      #   uses: microsoft/store-submission@v1
      #   with:
      #     command: update
      #     product-update: '{"packages":[{"packageUrl":"url_to_","languages":["en"],"architectures":["X64"],"isSilentInstall":true}]}'

      # - name: MS - Publish Submission
      #   uses: microsoft/store-submission@v1
      #   with:
      #     command: publish

      - name: Download artifact from latest build
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: release.yml
          run_id: ${{ github.event.workflow_run.id }}
          workflow_conclusion: success
          name_is_regexp: true
          name: dure-(x86_64|aarch64|armv7).*linux.*
          path: artifacts
          github_token: ${{ secrets.GITHUB_TOKEN }}
          check_artifacts: true
          search_artifacts: true
          if_no_artifact_found: warn

      - name: List downloaded files (verification)
        run: ls -R artifacts/

      - name: Prepare binaries for snap
        run: |
          mkdir -p snap-binaries/x86_64
          mkdir -p snap-binaries/aarch64
          mkdir -p snap-binaries/armv7

          # Extract binaries from artifacts
          if [ -d "artifacts/dure-x86_64-unknown-linux-musl" ]; then
            cp artifacts/dure-x86_64-unknown-linux-musl/dure-desktop snap-binaries/x86_64/
            chmod +x snap-binaries/x86_64/dure-desktop
          fi

          if [ -d "artifacts/dure-aarch64-unknown-linux-musl" ]; then
            cp artifacts/dure-aarch64-unknown-linux-musl/dure-desktop snap-binaries/aarch64/
            chmod +x snap-binaries/aarch64/dure-desktop
          fi

          if [ -d "artifacts/dure-armv7-unknown-linux-musleabihf" ]; then
            cp artifacts/dure-armv7-unknown-linux-musleabihf/dure-desktop snap-binaries/armv7/
            chmod +x snap-binaries/armv7/dure-desktop
          fi

          echo "Prepared binaries:"
          ls -R snap-binaries/

  publish-snapstore:
    runs-on: ubuntu-latest
    needs: download-and-deploy
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: amd64
            artifact-name: dure-x86_64-unknown-linux-musl
          - architecture: arm64
            artifact-name: dure-aarch64-unknown-linux-musl
          - architecture: armhf
            artifact-name: dure-armv7-unknown-linux-musleabihf

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: release.yml
          run_id: ${{ github.event.workflow_run.id }}
          workflow_conclusion: success
          github_token: ${{ secrets.GITHUB_TOKEN }}
          name: ${{ matrix.artifact-name }}
          path: artifacts
          if_no_artifact_found: fail
          skip_unpack: false

      - name: Debug - List downloaded artifacts
        run: |
          echo "Listing artifacts directory:"
          ls -laR artifacts/
          echo "Current directory:"
          pwd
          ls -la

      - name: Sync version from Cargo.toml to snapcraft.yaml
        run: |
          # Extract version from Cargo.toml
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Found version in Cargo.toml: $VERSION"

          # Update version in snapcraft.yaml
          sed -i "s/^version: .*/version: $VERSION/" snap/snapcraft.yaml

          echo "Updated snapcraft.yaml version:"
          grep "^version:" snap/snapcraft.yaml

      - name: Prepare snap binary in expected location
        run: |
          # Create the directory structure that snapcraft expects
          # All architectures use target/release/dure-desktop as per snapcraft.yaml
          mkdir -p target/release
          cp artifacts/dure-desktop target/release/
          chmod +x target/release/dure-desktop
          echo "Prepared ${{ matrix.architecture }} binary:"
          ls -la target/release/
          echo "Binary info:"
          file target/release/dure-desktop || true

      - name: Build snap package for ${{ matrix.architecture }}
        uses: snapcore/action-build@v1
        id: build
        env:
          TARGET_ARCH: ${{ matrix.architecture }}
        with:
          snapcraft-channel: stable

      - name: Publish snap to store (${{ matrix.architecture }})
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPSTORE_LOGIN }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable
