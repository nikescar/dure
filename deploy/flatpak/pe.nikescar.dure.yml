app-id: pe.nikescar.dure
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: dure
separate-locales: false

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --share=network
  - --filesystem=xdg-config/dure:create
  - --filesystem=xdg-data/dure:create
  - --filesystem=xdg-cache/dure:create
  - --filesystem=home/.dure:create
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.secrets
  - --device=dri
  - --socket=pulseaudio
  # Network access for WebSocket server, hosting APIs (DNS, Database, etc.)
  - --allow=bluetooth
  # Allow tray icon
  - --talk-name=org.kde.StatusNotifierWatcher
  - --own-name=org.kde.StatusNotifierItem-*

modules:
  - name: dure
    buildsystem: simple
    build-commands:
      - install -Dm755 dure /app/bin/dure
      - install -Dm644 pe.nikescar.dure.desktop /app/share/applications/pe.nikescar.dure.desktop
      - install -Dm644 pe.nikescar.dure.metainfo.xml /app/share/metainfo/pe.nikescar.dure.metainfo.xml
      - install -Dm644 logo.png /app/share/icons/hicolor/256x256/apps/pe.nikescar.dure.png
    sources:
      - type: file
        path: ../../artifacts/dure
      - type: file
        path: pe.nikescar.dure.desktop
      - type: file
        path: pe.nikescar.dure.metainfo.xml
      - type: file
        path: ../../imgs/logo.png