AutoName: Dure
Description: |-
  Dure is a distributed e-commerce client and hosting solution that enables small shop
  owners to run e-commerce operations without traditional centralized server infrastructure.

  Core Features:
  * Identity Management with cryptographic keys and attestation
  * Guest Front for customers (product browsing, cart, ordering)
  * Store Front for shop owners (product listings, shopping cart, payments)
  * Hosting Management (DNS, Database setup, Site deployment)
  * Store Management (Products, Orders, Shipments, Accounts, Shared listings)
  * Payment Integration (Portone, KakaoPay)
  * Multi-mode operation (Server mode, GUI mode with Material3, CLI mode)

  Hosting Options:
  * Firebase + Firestore + Cloud SQL + Cloud Messaging
  * Cloudflare Pages + Supabase + Realtime
  * Google Compute Engine (GCE)
  * Cafe24 VPS

  Why Dure?
  * Zero Transaction Fees (0% vs 2% on Shopify)
  * Quick Setup (hours instead of days or weeks)
  * Distributed Architecture (reduced hacking risk)
  * Flexible Hosting (choose your provider)
  * Excellent Inventory Management

  Platform Support:
  * Android, Linux, Windows, macOS (full features)
  * WASM (Guest & Store Front only)

RepoType: git
Repo: https://github.com/nikescar/dure.git

Builds:
  - versionName: 0.0.8
    versionCode: 8
    commit: d15314fde2569547fa7c46a78960fc12258e5fd2
    subdir: mobile
    sudo:
      - apt-get update
      - apt-get install -y make gcc libc-dev pkg-config libunwind-dev clang llvm
    gradle:
      - release
    output: app/build/outputs/apk/release/app-release-unsigned.apk
    srclibs:
      - rustup@1.27.1
    prebuild:
      - sed -i -e '/if (System.getenv("ANDROID_SPLIT_BUILD")/,/^    }/d' app/build.gradle
      - sed -i '/APPLICATION_VERSION_CODE/s/def appVersionCode.*/def appVersionCode
        = "$$VERCODE$$"/' app/build.gradle
      - sed -i '/APPLICATION_VERSION_NAME/s/def appVersionName.*/def appVersionName
        = "$$VERSION$$"/' app/build.gradle
      - $$rustup$$/rustup-init.sh -y --default-toolchain 1.81.0 --target aarch64-linux-android
        armv7-linux-androideabi i686-linux-android x86_64-linux-android
    scanignore:
      - mobile/Cargo.toml
      - Cargo.toml
    build:
      - source "$HOME/.cargo/env"
      - cargo install cargo-ndk --locked
      - cd ..
      - cargo ndk -t armeabi-v7a -o mobile/app/src/main/jniLibs/ build --release --lib
      - cargo ndk -t arm64-v8a -o mobile/app/src/main/jniLibs/ build --release --lib
      - cargo ndk -t x86 -o mobile/app/src/main/jniLibs/ build --release --lib
      - cargo ndk -t x86_64 -o mobile/app/src/main/jniLibs/ build --release --lib
    ndk: 28.2.13676358

AutoUpdateMode: Version v%v
UpdateCheckMode: Tags
UpdateCheckData: Cargo.toml|versioncode\s*=\s*"(\d+)"|.|version\s*=\s*"([\d.]+)"
